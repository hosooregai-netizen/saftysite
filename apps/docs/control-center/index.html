const VIEWS=[['overview','Overview'],['features','Features'],['steps','01~18 Steps'],['routes','Route Smoke'],['prompts','Prompt Launcher'],['blockers','Blockers']];
function loadState(){try{return JSON.parse(localStorage.getItem('service-control-center-state')||'{}')}catch{return {}}}
function saveState(s){localStorage.setItem('service-control-center-state',JSON.stringify(s))} let STATE=loadState(); let currentView='overview';
function setRouteStatus(route,status){STATE.routes=STATE.routes||{};STATE.routes[route]=status;saveState(STATE)} function setStepStatus(step,status){STATE.steps=STATE.steps||{};STATE.steps[step]=status;saveState(STATE)}
function resetState(){if(confirm('localStorage에 저장된 QA 상태를 초기화할까요?')){STATE={};saveState(STATE);render(currentView)}} function exportState(){const b=new Blob([JSON.stringify(STATE,null,2)],{type:'application/json'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='control-center-qa-state.json';a.click();URL.revokeObjectURL(u)}
async function copyText(t){await navigator.clipboard.writeText(t);alert('복사했습니다.')} function badge(t,c=''){return `<span class="pill ${c}">${t}</span>`} function paths(a){return `<div class="paths">${(a||[]).map(p=>`<code>${p}</code>`).join('')}</div>`}
function commandBlock(){return `unzip complete_markdown_structure_with_design_prompts_v4.zip
unzip service_improvements_01_to_16_apply_overlay.zip
bash scripts/service-improvements/run-final-qa.sh
bash scripts/service-improvements/create-rc-qa-report.sh`}
function renderOverview(){document.getElementById('pageTitle').textContent='Overview';document.getElementById('pageDesc').textContent='전체 문서/개선/QA 흐름을 조작하는 인터페이스입니다.';document.getElementById('view-overview').innerHTML=`
<article class="card span-8"><h3>Recommended Execution</h3><p class="muted">문서 구조 적용 → source overlay 적용 → clean build → route smoke → blocker patch → 디자인 구현 순서로 진행합니다.</p><pre>${commandBlock()}</pre></article>
<article class="card span-4"><h3>Source of Truth</h3><p class="muted">HTML은 원본 명세가 아닙니다. 원본은 Markdown과 registry입니다. 이 화면은 탐색·복사·QA 체크를 위한 control center입니다.</p></article>
<article class="card span-6"><h3>Critical Gates</h3><div class="checks">${FALLBACK.qa_gates.map(g=>`<div class="check">${badge(g.severity,g.severity.toLowerCase())}<span><strong>${g.title}</strong><br>${g.checks.join(' · ')}</span></div>`).join('')}</div></article>
<article class="card span-6"><h3>Quick Links</h3><div class="paths"><code>docs/safety-features/_handoff/README.md</code><code>docs/safety-features/_design-implementation/specs/FEATURE_DESIGN_PROMPT_INDEX.md</code><code>docs/service-improvements/_meta/APPLY_ORDER.md</code><code>docs/service-improvements/16-rc-manual-qa-blocker-tracking/README.md</code></div></article>`}
function renderFeatures(){document.getElementById('pageTitle').textContent='Features';document.getElementById('pageDesc').textContent='기능별 route, source, specs, prompts, QA gates.';document.getElementById('view-features').innerHTML=`<div class="feature-list span-12">${FALLBACK.features.map(f=>`<article class="card"><h3>${f.label} ${badge(f.risk,f.risk.includes('security')?'s0':'warn')}</h3><p class="muted">${f.description}</p><div class="tabs">${(f.routes||[]).map(r=>`<span class="pill">${r}</span>`).join('')}</div><h4>Source Files</h4>${paths(f.sourceFiles)}<h4>Specs</h4>${paths(f.specs)}<h4>Prompts</h4>${paths(f.prompts)}<h4>QA Gates</h4><div class="checks">${f.qaGates.map(c=>`<label class="check"><input type="checkbox"> <span>${c}</span></label>`).join('')}</div></article>`).join('')}</div>`}
function renderSteps(){document.getElementById('pageTitle').textContent='Service Improvements 01~18';document.getElementById('pageDesc').textContent='단계별 적용 상태를 localStorage에 저장합니다.';document.getElementById('view-steps').innerHTML=`<div class="step-list span-12">${FALLBACK.service_improvements.map(s=>{const v=(STATE.steps||{})[s.step]||s.status||'not-started';return `<div class="row"><span class="pill">${s.step}</span><div><strong>${s.title}</strong><small>${s.description}<br><code>${s.overlay}</code></small></div><select class="status" onchange="setStepStatus('${s.step}',this.value)">${['not-started','applied','build-pass','failed','done'].map(x=>`<option ${x===v?'selected':''}>${x}</option>`).join('')}</select></div>`}).join('')}</div>`}
function renderRoutes(){document.getElementById('pageTitle').textContent='Route Smoke';document.getElementById('pageDesc').textContent='브라우저 확인 결과를 저장합니다.';document.getElementById('view-routes').innerHTML=`<div class="route-list span-12">${FALLBACK.routes.map(r=>{const v=(STATE.routes||{})[r.route]||'Pending';return `<div class="row"><code>${r.route}</code><div><strong>${r.feature}</strong><small>${r.expected}</small></div><select class="status" onchange="setRouteStatus('${r.route}',this.value)">${['Pending','Pass','Fail','Blocked'].map(x=>`<option ${x===v?'selected':''}>${x}</option>`).join('')}</select></div>`}).join('')}</div>`}
function renderPrompts(){document.getElementById('pageTitle').textContent='Prompt Launcher';document.getElementById('pageDesc').textContent='프롬프트 경로를 확인하고 Codex용 요청을 복사합니다.';const bp=`너는 이 프로젝트의 시니어 풀스택 엔지니어다.

목표:
지정된 feature prompt를 실행하기 전에 관련 specs와 현재 코드를 읽고 계획을 세운 뒤, 최소 범위로 구현하라.

공통 제약:
- .next, .venv, __MACOSX는 수정하지 마라.
- 관련 없는 기능은 수정하지 마라.
- 수정 후 npm run build와 관련 route smoke를 실행하라.`;document.getElementById('view-prompts').innerHTML=`<article class="card span-12"><h3>Master Codex Prompt</h3><pre>${bp}</pre><button class="btn primary" onclick='copyText(${JSON.stringify(bp)})'>Copy Master Prompt</button></article><div class="prompt-list span-12">${FALLBACK.prompts.map(p=>`<div class="row"><span class="pill">${p.feature}</span><div><strong>${p.label}</strong><small><code>${p.path}</code></small></div><button class="btn" onclick='copyText(${JSON.stringify('아래 프롬프트 파일을 읽고 실행 계획을 세운 뒤 구현해라.\n\n프롬프트: '+p.path+'\n\n먼저 관련 specs와 source를 확인하고, build/QA 결과를 보고하라.')})'>Copy</button></div>`).join('')}</div>`}
function renderBlockers(){document.getElementById('pageTitle').textContent='Blockers';document.getElementById('pageDesc').textContent='S0/S1은 release hold입니다.';document.getElementById('view-blockers').innerHTML=`<article class="card span-12"><h3>Severity</h3><div class="checks"><div>${badge('S0','s0')} 보안/결제/인증/데이터 손상 → Hold</div><div>${badge('S1','s1')} clean build 또는 핵심 route 실패 → Hold</div><div>${badge('S2','warn')} 주요 UX 문제, workaround 있음 → Conditional/Hold</div><div>${badge('S3','ok')} minor visual/copy → Release 가능</div></div></article><div class="span-12">${FALLBACK.blockers.map(b=>`<div class="row"><span>${badge(b.severity,b.severity.toLowerCase())}</span><div><strong>${b.id} · ${b.feature}</strong><small>${b.summary}</small></div><span class="pill">${b.status}</span></div>`).join('')}</div>`}
function render(view){currentView=view;document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById('view-'+view).classList.remove('hidden');document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));if(view==='overview')renderOverview();if(view==='features')renderFeatures();if(view==='steps')renderSteps();if(view==='routes')renderRoutes();if(view==='prompts')renderPrompts();if(view==='blockers')renderBlockers()}
document.getElementById('nav').innerHTML=VIEWS.map(([id,label])=>`<button data-view="${id}" onclick="render('${id}')"><span>${label}</span><span>›</span></button>`).join('');render('overview');
</script></body></html>
